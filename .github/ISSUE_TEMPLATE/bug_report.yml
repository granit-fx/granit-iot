name: Bug Report
description: Report a bug in a Granit.IoT package
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Call '...'
        2. With parameters '...'
        3. Observe the error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happens instead.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack trace
      description: Paste any relevant logs or stack traces.
      render: text
  - type: input
    id: package
    attributes:
      label: Granit.IoT package(s)
      description: "Which package(s) are affected? (e.g. Granit.IoT.Ingestion 0.1.0)"
    validations:
      required: true
  - type: input
    id: dotnet-version
    attributes:
      label: .NET SDK version
      description: "Output of `dotnet --version`"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      description: "e.g. Ubuntu 24.04, Windows 11, macOS 15"
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (production down, no workaround)
        - Major (feature broken, difficult workaround)
        - Minor (annoying but workable)
        - Cosmetic (typo, formatting)
    validations:
      required: true

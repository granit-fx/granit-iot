# =============================================================================
# GitHub Actions CI/CD - Granit IoT
# =============================================================================
# Pipeline: build+format → test → security → sbom → pack → publish
#
# Required secrets:
#   GRANIT_PACKAGES_TOKEN — GitHub Packages token for the Granit.* NuGet feed
#
# Optional secrets:
#   SONAR_TOKEN           — SonarCloud authentication token
#   NUGET_API_KEY         — nuget.org API key (required only for tag releases)
# =============================================================================

name: CI

on:
  push:
    branches: [develop, main]
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default all permissions to read — each job declares write only where needed.
# Required by OpenSSF Scorecard: Token-Permissions check.
permissions: read-all

env:
  DOTNET_VERSION: "10.0.x"
  CONFIGURATION: Release
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ---------------------------------------------------------------------------
  # BUILD + FORMAT CHECK (shared gate — fails fast before tests)
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: NuGet cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Create local NuGet source directory
        run: mkdir -p local-nuget

      - name: Authenticate GitHub Packages
        env:
          GRANIT_PACKAGES_TOKEN: ${{ secrets.GRANIT_PACKAGES_TOKEN }}
        run: >
          dotnet nuget update source granit-registry
          --username granit-fx
          --password "$GRANIT_PACKAGES_TOKEN"
          --store-password-in-clear-text
          --configfile nuget.config

      - name: Build
        run: dotnet build Granit.IoT.slnx -c $CONFIGURATION

      - name: Format check
        run: dotnet format Granit.IoT.slnx --verify-no-changes --no-restore

  # ---------------------------------------------------------------------------
  # UNIT TESTS
  # ---------------------------------------------------------------------------
  test:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: NuGet cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Authenticate GitHub Packages
        env:
          GRANIT_PACKAGES_TOKEN: ${{ secrets.GRANIT_PACKAGES_TOKEN }}
        run: >
          dotnet nuget update source granit-registry
          --username granit-fx
          --password "$GRANIT_PACKAGES_TOKEN"
          --store-password-in-clear-text
          --configfile nuget.config

      - name: Build
        run: >
          dotnet build Granit.IoT.slnx
          -c $CONFIGURATION
          -p:RunAnalyzers=false
          -p:EnforceCodeStyleInBuild=false

      - name: Test
        run: >
          dotnet test Granit.IoT.slnx
          -c $CONFIGURATION --no-build
          --logger "trx;LogFilePath=TestResults/results.trx"
          --collect:"XPlat Code Coverage"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover,cobertura

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: test-results
          path: "**/TestResults/"
          retention-days: 7

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage
          path: "**/coverage.opencover.xml"
          retention-days: 7

  # ---------------------------------------------------------------------------
  # SECURITY (parallel, no build dependency)
  # ---------------------------------------------------------------------------
  secret-detection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.30.0
          curl --proto '=https' -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Gitleaks scan
        run: gitleaks detect --source . --verbose --log-opts="--all"

  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Authenticate GitHub Packages
        env:
          GRANIT_PACKAGES_TOKEN: ${{ secrets.GRANIT_PACKAGES_TOKEN }}
        run: >
          dotnet nuget update source granit-registry
          --username granit-fx
          --password "$GRANIT_PACKAGES_TOKEN"
          --store-password-in-clear-text
          --configfile nuget.config

      - name: Check vulnerable packages
        run: |
          dotnet restore Granit.IoT.slnx
          dotnet list Granit.IoT.slnx package --vulnerable --include-transitive 2>&1 | tee vulnerability-report.txt
          ! grep -q "has the following vulnerable packages" vulnerability-report.txt

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: vulnerability-report
          path: vulnerability-report.txt
          retention-days: 7

  # ---------------------------------------------------------------------------
  # ANALYSIS — SonarCloud (coverage + code smells, non-blocking)
  # Skipped on forks (no access to SONAR_TOKEN).
  # ---------------------------------------------------------------------------
  sonarcloud:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    continue-on-error: true
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Java (SonarScanner)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 17

      - name: NuGet cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: SonarCloud cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}

      - name: Authenticate GitHub Packages
        env:
          GRANIT_PACKAGES_TOKEN: ${{ secrets.GRANIT_PACKAGES_TOKEN }}
        run: >
          dotnet nuget update source granit-registry
          --username granit-fx
          --password "$GRANIT_PACKAGES_TOKEN"
          --store-password-in-clear-text
          --configfile nuget.config

      - name: Download coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: SonarCloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"granit-fx_granit-iot" \
            /o:"granit-fx" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.exclusions=".nuget/**,docs/**,scripts/**" \
            /d:sonar.coverage.exclusions="**/tests/**,**/bundles/**,**/GranitIoT*Module.cs" \
            /d:sonar.issue.ignore.multicriteria="e1,e2,e3,e4,e5,e6,e7" \
            /d:sonar.issue.ignore.multicriteria.e1.ruleKey="csharpsquid:S6608" \
            /d:sonar.issue.ignore.multicriteria.e1.resourceKey="**/*" \
            /d:sonar.issue.ignore.multicriteria.e2.ruleKey="external_roslyn:IDE0007" \
            /d:sonar.issue.ignore.multicriteria.e2.resourceKey="**/*" \
            /d:sonar.issue.ignore.multicriteria.e3.ruleKey="csharpsquid:S2699" \
            /d:sonar.issue.ignore.multicriteria.e3.resourceKey="**/tests/**" \
            /d:sonar.issue.ignore.multicriteria.e4.ruleKey="external_roslyn:IDE0022" \
            /d:sonar.issue.ignore.multicriteria.e4.resourceKey="**/*" \
            /d:sonar.issue.ignore.multicriteria.e5.ruleKey="csharpsquid:S2094" \
            /d:sonar.issue.ignore.multicriteria.e5.resourceKey="**/*Category.cs" \
            /d:sonar.issue.ignore.multicriteria.e6.ruleKey="csharpsquid:S107" \
            /d:sonar.issue.ignore.multicriteria.e6.resourceKey="**/Handlers/*.cs,**/Endpoints/*.cs,**/Services/DeviceHeartbeatTimeoutService.cs,**/Internal/IngestionPipeline.cs,**/Internal/MqttnetIoTBridge.cs" \
            /d:sonar.issue.ignore.multicriteria.e7.ruleKey="csharpsquid:S1854" \
            /d:sonar.issue.ignore.multicriteria.e7.resourceKey="**/MqttnetIoTBridge.cs" \
            /d:sonar.qualitygate.wait="true"
          dotnet build Granit.IoT.slnx -c $CONFIGURATION
          dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

  # ---------------------------------------------------------------------------
  # SBOM — CycloneDX JSON, uploaded as artifact and attached to releases
  # ---------------------------------------------------------------------------
  sbom:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write  # read for checkout, write for release asset upload
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: NuGet cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Authenticate GitHub Packages
        env:
          GRANIT_PACKAGES_TOKEN: ${{ secrets.GRANIT_PACKAGES_TOKEN }}
        run: >
          dotnet nuget update source granit-registry
          --username granit-fx
          --password "$GRANIT_PACKAGES_TOKEN"
          --store-password-in-clear-text
          --configfile nuget.config

      - name: Install CycloneDX
        run: dotnet tool install --global CycloneDX

      - name: Generate SBOM
        run: dotnet CycloneDX Granit.IoT.slnx -o ./sbom --json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sbom
          path: sbom/bom.json
          retention-days: 90

      - name: Attach SBOM to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} sbom/bom.json --clobber

  # ---------------------------------------------------------------------------
  # PACK — produce .nupkg artifacts (dev versions on develop/main, semver on tags)
  # ---------------------------------------------------------------------------
  pack:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: read
      id-token: write      # required for SLSA provenance attestation
      attestations: write  # required for SLSA provenance attestation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: NuGet cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Authenticate GitHub Packages
        env:
          GRANIT_PACKAGES_TOKEN: ${{ secrets.GRANIT_PACKAGES_TOKEN }}
        run: >
          dotnet nuget update source granit-registry
          --username granit-fx
          --password "$GRANIT_PACKAGES_TOKEN"
          --store-password-in-clear-text
          --configfile nuget.config

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.1.0-dev.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: dotnet build Granit.IoT.slnx -c $CONFIGURATION

      - name: Pack
        run: >
          dotnet pack Granit.IoT.slnx
          -c $CONFIGURATION --no-build
          -p:PackageVersion=${{ steps.version.outputs.version }}
          -o ./nupkgs

      - name: Upload packages
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: nupkgs
          path: nupkgs/
          retention-days: 7

      - name: Attest build provenance (SLSA Level 2)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: nupkgs/*.nupkg

  # ---------------------------------------------------------------------------
  # PUBLISH — GitHub Packages (dev packages on develop/main)
  # sbom is kept in needs for ordering on main, but skipped on develop.
  # The if condition uses always() so the job runs even when sbom is skipped.
  # ---------------------------------------------------------------------------
  publish-github:
    needs: [pack, sbom]
    runs-on: ubuntu-latest
    if: |
      always()
      && needs.pack.result == 'success'
      && (needs.sbom.result == 'success' || needs.sbom.result == 'skipped')
      && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    permissions:
      packages: write
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: nupkgs
          path: nupkgs

      - name: Push to GitHub Packages
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          dotnet nuget push "nupkgs/*.nupkg"
          --source "https://nuget.pkg.github.com/granit-fx/index.json"
          --api-key "$NUGET_AUTH_TOKEN"
          --skip-duplicate

  # ---------------------------------------------------------------------------
  # PUBLISH — nuget.org (release packages on version tags)
  # ---------------------------------------------------------------------------
  publish-nuget:
    needs: [pack, sbom]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: nuget-publish
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: nupkgs
          path: nupkgs

      - name: Push to nuget.org
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.NUGET_API_KEY }}
        run: >
          dotnet nuget push "nupkgs/*.nupkg"
          --source "https://api.nuget.org/v3/index.json"
          --api-key "$NUGET_AUTH_TOKEN"
          --skip-duplicate
